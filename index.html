<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Sketch Style</title>
    <!-- 引入手寫風格字體 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Patrick+Hand&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- 背景裝飾層 -->
<div id="bg-decoration">
    <!-- 原本的方塊 -->
    <div class="bg-piece shape-i" style="--c: #22d3ee; top: 10%; left: 5%; animation-delay: 0s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-o" style="--c: #eab308; top: 15%; right: 10%; animation-delay: -2s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-t" style="--c: #a855f7; bottom: 15%; left: 8%; animation-delay: -4s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-l" style="--c: #f97316; bottom: 20%; right: 5%; animation-delay: -1s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-z" style="--c: #ef4444; top: 50%; left: -5%; transform: scale(0.8); animation-delay: -3s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
     <div class="bg-piece shape-j" style="--c: #3b82f6; top: 5%; left: 40%; filter: blur(2px); opacity: 0.4; transform: scale(0.6); animation-delay: -5s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    
    <!-- 原本新增的方塊 -->
    <div class="bg-piece shape-t" style="--c: #22c55e; top: 30%; left: -2%; filter: blur(3px); opacity: 0.5; transform: scale(0.5); animation-delay: -7s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-i" style="--c: #f97316; bottom: 10%; right: 15%; opacity: 0.3; transform: scale(0.7) rotate(90deg); animation-delay: -2.5s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-o" style="--c: #ef4444; top: 75%; right: -5%; filter: blur(1px); transform: scale(1.1); animation-delay: -6s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-l" style="--c: #3b82f6; top: -5%; right: 30%; opacity: 0.5; transform: scale(0.6); animation-delay: -1.5s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-z" style="--c: #a855f7; bottom: 35%; left: 15%; filter: blur(4px); opacity: 0.4; transform: scale(0.4); animation-delay: -8s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-j" style="--c: #22d3ee; top: 40%; right: 20%; opacity: 0.2; transform: scale(0.9); animation-delay: -4.5s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>

    <!-- 針對中間偏左補充的方塊 -->
    <div class="bg-piece shape-o" style="--c: #eab308; top: 48%; left: 10%; opacity: 0.4; transform: scale(0.75) rotate(15deg); animation-delay: -3.5s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-j" style="--c: #3b82f6; top: 75%; left: 18%; opacity: 0.5; filter: blur(1px); transform: scale(0.8) rotate(-20deg); animation-delay: -5.5s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
    <div class="bg-piece shape-i" style="--c: #22d3ee; top: 20%; left: 15%; opacity: 0.3; filter: blur(2px); transform: scale(0.6) rotate(45deg); animation-delay: -1.2s;">
        <div class="cell"></div><div class="cell"></div><div class="cell"></div><div class="cell"></div>
    </div>
</div>

<!-- ================= 遊戲主目錄 ================= -->
<div id="main-menu" class="screen-layer active">
    <div class="menu-container">
        <h1 class="game-title" style="transform: rotate(-3deg);">TETRIS</h1>
        
        <div class="mode-buttons">
            <button onclick="startGame('marathon')">
                <strong>🏃 無盡模式</strong><br>
                <small>經典無盡，挑戰最高分</small>
            </button>
            <button onclick="startGame('sprint')">
                <strong>⚡ 40行衝刺</strong><br>
                <small>計時挑戰，比誰消得快</small>
            </button>
            <button onclick="startGame('ultra')">
                <strong>⏱️ 2分鐘計時賽</strong><br>
                <small>限時刷分，挑戰極限</small>
            </button>
        </div>

        <div style="margin-top: 20px; display: flex; gap: 10px; justify-content: center;">
            <button onclick="openSettings()" class="secondary-btn">⚙️ 按鍵設定</button>
            <button id="btn-mute-menu" onclick="toggleMute()" class="secondary-btn">🔊 聲音: 開</button>
        </div>
    </div>
</div>

<!-- ================= 遊戲畫面 ================= -->
<div id="game-layout" class="screen-layer" style="display: none;">
    <!-- 左側面板 -->
    <div class="side-panel">
        <div class="panel-section">
            <h3>HOLD</h3>
            <canvas id="hold-canvas" class="mini-canvas" width="120" height="120"></canvas>
        </div>
        
        <!-- 動態排行榜區塊 -->
        <div class="panel-section leaderboard-section">
            <h3 style="white-space: nowrap; font-size: 1.3rem;">🏆 最高紀錄</h3>
            <div id="current-mode-record" style="font-size: 1.6rem; color: #15803d; font-weight: bold;">-</div>
            <div id="current-mode-name" style="font-size: 0.9rem; color: #64748b; margin-top: 5px;">-</div>
        </div>

        <div class="controls-info">
            <div class="key-row"><span class="key-badge" id="kb-hold">Shift</span> <span>暫存</span></div>
            <div class="key-row"><span class="key-badge" id="kb-hardDrop">Space</span> <span>直接落下</span></div>
            <div class="key-row">
                <span class="key-badge" id="kb-left">J</span>
                <span class="key-badge" id="kb-right">L</span> 
                <span>左右移動</span>
            </div>
            <div class="key-row"><span class="key-badge" id="kb-softDrop">K</span> <span>軟降</span></div>
            <div class="key-row"><span class="key-badge" id="kb-rotateCW">I</span> <span>順時轉</span></div>
            <div class="key-row"><span class="key-badge" id="kb-rotateCCW">U</span> <span>逆時轉</span></div>
            <div class="key-row"><span class="key-badge" id="kb-rotate180">O</span> <span>180轉</span></div>
            <div class="key-row"><span class="key-badge">ESC</span> <span>暫停/返回</span></div>
        </div>
    </div>

    <!-- 中間面板 -->
    <div style="position: relative;">
        <canvas id="main-canvas" width="300" height="600"></canvas>
        
        <!-- All Clear 特效文字 -->
        <div id="all-clear-message">ALL CLEAR!</div>

        <div id="pause-overlay">
            <div style="font-size: 3rem; transform: rotate(-5deg);">PAUSED</div>
            <div style="font-size: 1.2rem; margin-top: 10px;">按 ESC 繼續塗鴉</div>
            <button onclick="startGame(currentMode)" style="width: 80%; margin-top: 25px; background: #22c55e; color: #fff; border-color: #166534;">重新開始</button>
            <button onclick="saveAndReset()" style="width: 80%; margin-top: 10px; background: #f1f5f9; color: #475569;">放棄並回目錄</button>
        </div>
    </div>

    <!-- 右側面板 -->
    <div class="side-panel">
        <div class="panel-section">
            <h3>NEXT</h3>
            <canvas id="next-canvas" class="mini-canvas" width="120" height="360"></canvas>
        </div>

        <div class="panel-section" style="margin-top: auto;">
            <div class="score-box" id="time-box" style="display: none;">
                <div class="score-label">TIME</div>
                <div class="score-val" id="time">00:00</div>
            </div>
            <div class="score-box">
                <div class="score-label">SCORE</div>
                <div class="score-val" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">LINES</div>
                <div class="score-val" id="lines">0</div>
            </div>
            <div class="score-box" id="level-box">
                <div class="score-label">LEVEL</div>
                <div class="score-val" id="level">1</div>
            </div>
        </div>

        <div style="margin-top: 15px;">
            <button id="btn-mute-game" onclick="toggleMute()" class="toggle-btn">🔊 聲音: 開</button>
        </div>
    </div>
</div>

<!-- ================= 設定對話框 ================= -->
<dialog id="settings-dialog">
    <h2 style="transform: rotate(-2deg); margin-bottom: 20px;">⚙️ 按鍵設定</h2>
    <p style="font-size: 0.9rem; color:#64748b; margin-bottom: 15px;">點擊按鈕後，按下你想要設定的新按鍵</p>
    
    <div id="keybinds-container" class="keybinds-grid">
        <!-- JS 動態生成 -->
    </div>

    <div style="display: flex; gap: 10px; margin-top: 25px;">
        <button onclick="resetDefaultKeys()" style="background:#f1f5f9; color:#475569;">恢復預設</button>
        <button onclick="closeSettings()" style="background:#22c55e; color:#fff; border-color:#166534;">完成</button>
    </div>
</dialog>

<!-- 遊戲結束對話框 -->
<dialog id="game-over-dialog">
    <h2 id="go-title" style="transform: rotate(-3deg);">GAME OVER</h2>
    <p id="go-desc">最終分數</p>
    <h1 id="final-score">0</h1>
    
    <div id="new-record-box" style="display: none; margin-bottom: 15px;">
        <h3 style="color: #f59e0b; margin:0;">🎉 新紀錄！</h3>
        <input type="text" id="player-name" placeholder="輸入你的大名" maxlength="10">
    </div>

    <div style="display: flex; gap: 10px; justify-content: center;">
        <button onclick="saveAndReset()" class="action-btn">儲存並回主選單</button>
    </div>
</dialog>

<script src="script.js"></script>
</body>
</html>
